services:

  broker-service:
    image: tsawler/broker-service:latest
    ports:
      - "8080:8080"
    deploy:
      mode: replicated
      replicas: 1

  listener-service:
    image: tsawler/listener-service:latest
    deploy:
      mode: replicated
      replicas: 1

  authentication-service:
    image: tsawler/authentication-service:latest
    deploy:
      mode: replicated
      replicas: 1
    environment:
      DSN: "host=postgres port=5432 user=postgres password=root dbname=users sslmode=disable timezone=UTC connect_timeout=5"

  logger-service:
    image: tsawler/logger-service:latest
    deploy:
      mode: replicated
      replicas: 1

  mailer-service:
    image: tsawler/mail-service:latest
    deploy:
      mode: replicated
      replicas: 1
    environment:
      MAIL_DOMAIN: localhost
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      MAIL_ENCRYPTION: none
      MAIL_USERNAME: ""
      MAIL_PASSWORD: ""
      FROM_NAME: "fian"
      FROM_ADDRESS: fianet341@gmail.com

  rabbitmq:
    image: rabbitmq:3-management-alpine
    deploy:
      mode: global

  mailhog:
    image: 'mailhog/mailhog:latest'
    ports:
      - "8025:8025"
    deploy:
      mode: global

  mongo:
    image: 'mongo:7.0'
    ports:
      - "27017:27017"
    deploy:
      mode: global
    environment:
      MONGO_INITDB_DATABASE: logs
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - ./db-data/mongo/:/data/db

  postgres:
    image: 'postgres:14.0'
    ports:
      - "5432:5432"
    restart: always
    deploy: 
      mode: replicated
      replicas: 1
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "root"
      POSTGRES_DB: "users"
    volumes:
      - ./db-data/postgres/:/var/lib/postgresql/data
      - ./users.sql:/docker-entrypoint-initdb.d/users.sql